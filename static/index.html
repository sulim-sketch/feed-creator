<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BOBP Portfolio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f4f6f9;
      color: #1a2233;
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      padding: 36px 0 60px;
    }

    .page-wrap { max-width: 1100px; margin: 0 auto; padding: 0 28px; }

    /* ── header ── */
    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      border-bottom: 1px solid #dce3ed;
      padding-bottom: 16px;
      margin-bottom: 24px;
    }
    .brand { font-size: 11px; letter-spacing: 0.12em; color: #8a9ab0; text-transform: uppercase; }
    h1 { font-size: 22px; font-weight: 600; color: #0f1a2e; letter-spacing: -0.02em; margin-top: 4px; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .date-badge {
      font-size: 12px; color: #5a7090;
      background: #fff; border: 1px solid #dce3ed;
      border-radius: 6px; padding: 6px 10px; white-space: nowrap;
      cursor: pointer; outline: none;
      font-family: inherit;
    }
    .date-badge:focus { border-color: #5a7090; }
    .btn {
      font-size: 12px; font-weight: 500; cursor: pointer;
      padding: 7px 14px; border-radius: 7px; border: 1px solid #dce3ed;
      background: #fff; color: #3a5070;
      transition: background .15s, color .15s;
    }
    .btn:hover { background: #eef1f6; color: #0f1a2e; }
    .btn-primary { background: #0f1a2e; color: #fff; border-color: #0f1a2e; }
    .btn-primary:hover { background: #1a2e50; }

    /* ── stats ── */
    .stats { display: flex; gap: 12px; margin-bottom: 24px; }
    .stat-card {
      flex: 1; background: #fff; border: 1px solid #dce3ed;
      border-radius: 10px; padding: 14px 18px;
    }
    .stat-label { font-size: 10px; letter-spacing: 0.1em; color: #8a9ab0; text-transform: uppercase; margin-bottom: 6px; }
    .stat-value { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; color: #0f1a2e; }

    /* ── two-column tables ── */
    .tables-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .table-block { background: #fff; border: 1px solid #dce3ed; border-radius: 12px; overflow: hidden; }
    .table-title {
      font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
      color: #5a7090; padding: 10px 16px;
      border-bottom: 1px solid #eef1f6; background: #f8fafc;
      display: flex; align-items: center; justify-content: space-between;
    }
    .expand-btn-top {
      font-size: 11px; font-weight: 500; color: #5a7090; letter-spacing: .04em;
      background: none; border: 1px solid #dce3ed; border-radius: 5px;
      padding: 3px 10px; cursor: pointer; transition: background .15s, color .15s;
      text-transform: none;
    }
    .expand-btn-top:hover { background: #eef1f6; color: #0f1a2e; }

    table { width: 100%; border-collapse: collapse; }
    th {
      font-size: 10px; letter-spacing: 0.08em; color: #8a9ab0;
      text-transform: uppercase; padding: 10px 14px;
      text-align: left; font-weight: 500; background: #f8fafc;
      border-bottom: 1px solid #dce3ed;
    }
    th.num { text-align: right; }
    tbody tr { border-bottom: 1px solid #eef1f6; transition: background .15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f4f7fb !important; }
    td { padding: 10px 14px; font-size: 13px; }
    td.rank { color: #b0bece; font-size: 12px; width: 36px; }
    td.ticker-cell { }
    .t-name { font-weight: 600; font-size: 13.5px; color: #0f1a2e; }
    .t-company { font-size: 11px; color: #8a9ab0; margin-top: 1px; }
    td.ret-cell { text-align: right; white-space: nowrap; }
    .ret-val { font-weight: 600; font-size: 14px; font-variant-numeric: tabular-nums; }

    /* bar */
    .bar-wrap { display: flex; align-items: center; gap: 8px; }
    .bar-track {
      flex: 1; height: 5px; background: #eef1f6;
      border-radius: 3px; position: relative; overflow: hidden;
    }
    .bar-fill { position: absolute; top: 0; height: 100%; border-radius: 3px; min-width: 2px; }
    .bar-center { position: absolute; left: 50%; top: 0; width: 1px; height: 100%; background: #dce3ed; }

    /* highlight */
    tr.highlight { outline: 2px solid #f5a623; outline-offset: -2px; background: rgba(245,166,35,.07) !important; }
    tr.highlight:hover { background: rgba(245,166,35,.12) !important; }
    .feed-badge {
      display: inline-block; margin-left: 7px;
      padding: 1px 6px; font-size: 10px; font-weight: 700; letter-spacing: .06em;
      color: #f5a623; background: rgba(245,166,35,.12);
      border: 1px solid rgba(245,166,35,.4); border-radius: 4px; vertical-align: middle;
    }

    /* expand */
    .expand-btn {
      display: block; width: 100%; padding: 11px;
      background: #f8fafc; border: none; border-top: 1px solid #eef1f6;
      color: #5a7090; font-size: 12px; font-weight: 500; letter-spacing: .04em;
      cursor: pointer; transition: background .15s, color .15s;
    }
    .expand-btn:hover { background: #eef1f6; color: #0f1a2e; }

    /* loading */
    .loading { text-align: center; padding: 40px; color: #8a9ab0; font-size: 13px; }

    /* ── settings modal ── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.35); z-index: 100;
      align-items: center; justify-content: center;
    }
    .overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 14px; padding: 28px 32px;
      width: 420px; max-width: 90vw;
      box-shadow: 0 8px 32px rgba(0,0,0,.15);
    }
    .modal h2 { font-size: 17px; font-weight: 600; color: #0f1a2e; margin-bottom: 20px; }
    .modal label { font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: #8a9ab0; display: block; margin-bottom: 6px; }
    .modal input[type=text], .modal input[type=password] {
      width: 100%; padding: 9px 12px; border: 1px solid #dce3ed;
      border-radius: 8px; font-size: 13px; color: #0f1a2e;
      outline: none; transition: border-color .15s;
    }
    .modal input:focus { border-color: #5a7090; }
    .modal .hint { font-size: 11px; color: #8a9ab0; margin-top: 6px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 22px; }
    .msg { font-size: 12px; margin-top: 10px; min-height: 16px; color: #0a9e5c; }

    /* ── pipeline panel ── */
    .pipeline-panel {
      position: fixed; right: 0; top: 0; bottom: 0; width: 420px;
      background: #0d1520; color: #c8d8e8;
      transform: translateX(100%); transition: transform .25s ease;
      z-index: 200; display: flex; flex-direction: column;
      box-shadow: -4px 0 24px rgba(0,0,0,.2);
    }
    .pipeline-panel.open { transform: translateX(0); }
    .panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid #1e2a3a;
      font-size: 13px; font-weight: 600; letter-spacing: .04em;
    }
    .panel-close { background: none; border: none; color: #6a88aa; font-size: 18px; cursor: pointer; line-height: 1; }
    .panel-close:hover { color: #c8d8e8; }
    .panel-body {
      flex: 1; overflow-y: auto; padding: 16px 20px;
      font-family: 'Consolas', 'Menlo', monospace; font-size: 12px; line-height: 1.7;
      white-space: pre-wrap; word-break: break-all;
    }
    .line-done { color: #00c97a; }
    .line-err  { color: #ff6b6b; }

    footer { margin-top: 20px; text-align: right; font-size: 11px; color: #b0bece; }
  </style>
</head>
<body>
<div class="page-wrap">
  <header>
    <div>
      <div class="brand">Core Sixteen</div>
      <h1>BOBP Portfolio Returns</h1>
    </div>
    <div class="header-right">
      <input type="date" class="date-badge" id="date-input" onchange="onDateChange()" />
      <button class="btn btn-primary" onclick="openPipeline()">▶ Run Pipeline</button>
      <button class="btn" onclick="openSettings()">⚙ Settings</button>
    </div>
  </header>

  <div class="stats" id="stats">
    <div class="stat-card"><div class="stat-label">Holdings</div><div class="stat-value" id="s-holdings">—</div></div>
    <div class="stat-card"><div class="stat-label">Avg 1D Return</div><div class="stat-value" id="s-avg">—</div></div>
    <div class="stat-card"><div class="stat-label">Advancing</div><div class="stat-value" id="s-adv" style="color:#0a9e5c">—</div></div>
    <div class="stat-card"><div class="stat-label">Declining</div><div class="stat-value" id="s-dec" style="color:#d93025">—</div></div>
  </div>

  <div class="tables-row" id="tables-row">
    <div class="loading">Loading portfolio data…</div>
  </div>

  <footer>1D = daily return &nbsp;·&nbsp; 5D = 5-business-day return &nbsp;·&nbsp; BOBP excludes BIL &nbsp;·&nbsp; Data via Yahoo Finance</footer>
</div>

<!-- Settings Modal -->
<div class="overlay" id="settings-overlay" onclick="overlayClick(event)">
  <div class="modal">
    <h2>Settings</h2>
    <label>Gemini API Key</label>
    <input type="password" id="api-key-input" placeholder="Enter new key to replace current" autocomplete="off" />
    <div class="hint" id="key-hint">Current key: loading…</div>
    <div class="msg" id="settings-msg"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeSettings()">Cancel</button>
      <button class="btn btn-primary" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<!-- Pipeline Panel -->
<div class="pipeline-panel" id="pipeline-panel">
  <div class="panel-header">
    <span>Pipeline Output</span>
    <button class="panel-close" onclick="closePipelinePanel()">✕</button>
  </div>
  <div class="panel-body" id="pipeline-output"></div>
</div>

<script>
  let allRows = [], allNames = {}, highlightTicker = null;
  const D1_SHOW = 5, W1_SHOW = 5;
  let d1Expanded = false, w1Expanded = false;

  function onDateChange() {
    const val = document.getElementById('date-input').value;
    loadPortfolio(val);
  }

  // ── load portfolio ──────────────────────────────────────────────────────────
  async function loadPortfolio(dateParam) {
    try {
      const url  = dateParam ? `/api/portfolio?date=${dateParam}` : '/api/portfolio';
      const res  = await fetch(url);
      const data = await res.json();
      allRows          = data.rows;
      allNames         = data.names;
      highlightTicker  = data.highlight;

      const input = document.getElementById('date-input');
      input.value = data.trading_date;
      input.max   = data.latest_date;

      const avg     = allRows.reduce((s, r) => s + r.d1, 0) / allRows.length;
      const adv     = allRows.filter(r => r.d1 >= 0).length;
      document.getElementById('s-holdings').textContent = allRows.length;
      document.getElementById('s-avg').textContent      = (avg >= 0 ? '+' : '') + avg.toFixed(2) + '%';
      document.getElementById('s-avg').style.color      = avg >= 0 ? '#0a9e5c' : '#d93025';
      document.getElementById('s-adv').textContent      = adv;
      document.getElementById('s-dec').textContent      = allRows.length - adv;

      renderTables();
    } catch (e) {
      document.getElementById('tables-row').innerHTML =
        '<div class="loading" style="color:#d93025">Failed to load data: ' + e.message + '</div>';
    }
  }

  // ── render tables ───────────────────────────────────────────────────────────
  function renderTables() {
    const d1Sorted = [...allRows].sort((a, b) => b.d1 - a.d1);
    const w1Sorted = [...allRows].sort((a, b) => b.w1 - a.w1);
    const maxD1    = Math.max(...allRows.map(r => Math.abs(r.d1))) || 1;
    const maxW1    = Math.max(...allRows.map(r => Math.abs(r.w1))) || 1;

    document.getElementById('tables-row').innerHTML =
      '<div class="table-block" id="block-d1"></div>' +
      '<div class="table-block" id="block-w1"></div>';

    buildTable('block-d1', '1D Return', d1Sorted, 'd1', maxD1, D1_SHOW, 'd1');
    buildTable('block-w1', '5D Return', w1Sorted, 'w1', maxW1, W1_SHOW, 'w1');
  }

  function buildTable(blockId, title, rows, field, maxAbs, showCount, expandKey) {
    const block   = document.getElementById(blockId);
    const visible = rows.slice(0, showCount);
    const rest    = rows.slice(showCount);
    const isD1    = field === 'd1';

    const hasRest = rest.length > 0;

    let html = `<div class="table-title">
      <span>${title}</span>
      ${hasRest ? `<button class="expand-btn-top" id="expand-btn-top-${expandKey}"
        onclick="toggleExpand('${expandKey}', ${rest.length})" style="display:none">
        Show less ▴
      </button>` : ''}
    </div>
    <table>
      <thead><tr>
        <th>#</th><th>Ticker</th>
        <th class="num">${isD1 ? '1D' : '5D'}</th>
        <th></th>
      </tr></thead>
      <tbody id="tbody-top-${expandKey}">` +
      visible.map((r, i) => rowHtml(i + 1, r, field, maxAbs)).join('') +
    `</tbody>`;

    if (hasRest) {
      html += `<tbody id="tbody-rest-${expandKey}" style="display:none">` +
        rest.map((r, i) => rowHtml(showCount + i + 1, r, field, maxAbs)).join('') +
      `</tbody>`;
    }

    html += '</table>';

    if (hasRest) {
      html += `<button class="expand-btn" id="expand-btn-${expandKey}"
        onclick="toggleExpand('${expandKey}', ${rest.length})">
        Show ${rest.length} more ▾
      </button>`;
    }

    block.innerHTML = html;
  }

  function rowHtml(rank, r, field, maxAbs) {
    const val      = r[field];
    const color    = val >= 0 ? '#0a9e5c' : '#d93025';
    const bg       = '';
    const sign     = val >= 0 ? '+' : '';
    const barW     = (Math.abs(val) / maxAbs * 100).toFixed(1);
    const barML    = val >= 0 ? '50%' : `${50 - parseFloat(barW)}%`;
    const name     = allNames[r.ticker] || '';
    const isHL     = r.ticker === highlightTicker;
    const hlClass  = isHL ? ' highlight' : '';
    const badge    = isHL ? '<span class="feed-badge">FEED</span>' : '';

    return `<tr style="background:${bg}" class="${hlClass}">
      <td class="rank">${rank}</td>
      <td class="ticker-cell">
        <div class="t-name">${r.ticker}${badge}</div>
        ${name ? `<div class="t-company">${name}</div>` : ''}
      </td>
      <td class="ret-cell"><span class="ret-val" style="color:${color}">${sign}${val.toFixed(2)}%</span></td>
      <td style="width:30%;padding-right:14px">
        <div class="bar-track">
          <div class="bar-fill" style="width:${barW}%;background:${color};margin-left:${barML}"></div>
          <div class="bar-center"></div>
        </div>
      </td>
    </tr>`;
  }

  function toggleExpand(key, restCount) {
    const tbody   = document.getElementById(`tbody-rest-${key}`);
    const btnBot  = document.getElementById(`expand-btn-${key}`);
    const btnTop  = document.getElementById(`expand-btn-top-${key}`);
    const open    = tbody.style.display === 'none';
    tbody.style.display  = open ? '' : 'none';
    btnBot.textContent   = open ? 'Show less ▴' : `Show ${restCount} more ▾`;
    if (btnTop) {
      btnTop.style.display = open ? '' : 'none';
    }
  }

  // ── settings ────────────────────────────────────────────────────────────────
  async function openSettings() {
    document.getElementById('settings-overlay').classList.add('open');
    document.getElementById('settings-msg').textContent = '';
    document.getElementById('api-key-input').value = '';
    const res  = await fetch('/api/env');
    const data = await res.json();
    document.getElementById('key-hint').textContent =
      data.has_key ? `Current key: ${data.GEMINI_API_KEY_MASKED}` : 'No key set';
  }

  function closeSettings() {
    document.getElementById('settings-overlay').classList.remove('open');
  }

  function overlayClick(e) {
    if (e.target === e.currentTarget) closeSettings();
  }

  async function saveSettings() {
    const key = document.getElementById('api-key-input').value.trim();
    if (!key) { document.getElementById('settings-msg').textContent = 'Enter a key first.'; return; }
    const res  = await fetch('/api/env', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ GEMINI_API_KEY: key }),
    });
    const data = await res.json();
    if (data.ok) {
      document.getElementById('settings-msg').textContent = 'Saved.';
      document.getElementById('api-key-input').value = '';
      const env  = await fetch('/api/env');
      const edata = await env.json();
      document.getElementById('key-hint').textContent = `Current key: ${edata.GEMINI_API_KEY_MASKED}`;
    }
  }

  // ── pipeline ─────────────────────────────────────────────────────────────────
  function openPipeline() {
    const panel  = document.getElementById('pipeline-panel');
    const output = document.getElementById('pipeline-output');
    panel.classList.add('open');
    output.innerHTML = '';

    const es = new EventSource('/api/pipeline/run?_t=' + Date.now());

    // POST instead of GET for SSE — use fetch with readable stream
    panel.classList.add('open');
    output.innerHTML = '<span style="color:#6a88aa">Starting pipeline…\n</span>';

    fetch('/api/pipeline/run', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' })
      .then(res => {
        const reader = res.body.getReader();
        const dec    = new TextDecoder();
        function read() {
          reader.read().then(({ done, value }) => {
            if (done) return;
            const text = dec.decode(value);
            text.split('\n').forEach(line => {
              if (!line.startsWith('data: ')) return;
              const msg = line.slice(6);
              if (!msg) return;
              const span = document.createElement('span');
              if (msg.startsWith('[EXIT:0]'))      span.className = 'line-done';
              else if (msg.startsWith('[EXIT:'))   span.className = 'line-err';
              span.textContent = msg + '\n';
              output.appendChild(span);
              output.scrollTop = output.scrollHeight;
            });
            read();
          });
        }
        read();
      });
  }

  function closePipelinePanel() {
    document.getElementById('pipeline-panel').classList.remove('open');
  }

  // ── init ─────────────────────────────────────────────────────────────────────
  loadPortfolio();
</script>
</body>
</html>
